<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ซูโม่เป็นบ้าไหม?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&family=Noto+Serif+Thai:wght@800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --text: #f5f0e8;
      --muted: #888;
      --yes-bg: #1a0a0a;
      --yes-color: #ff4444;
      --yes-border: #ff4444;
      --no-bg: #0a1a0f;
      --no-color: #44cc77;
      --no-border: #44cc77;
      --grain-opacity: 0.04;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: var(--grain-opacity);
      pointer-events: none;
      z-index: 9999;
    }

    .scene {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
      overflow: hidden;
    }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .deco-circle.c1 { width: 400px; height: 400px; background: #ff2200; top: -100px; right: -100px; }
    .deco-circle.c2 { width: 300px; height: 300px; background: #00cc55; bottom: -80px; left: -80px; }

    .question {
      font-family: 'Noto Serif Thai', serif;
      font-size: clamp(24px, 6vw, 52px);
      font-weight: 900;
      color: var(--text);
      text-align: center;
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
    }

    .question span {
      color: #ff4444;
    }

    .choices {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Sarabun', sans-serif;
      font-size: clamp(16px, 3.5vw, 22px);
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 100px;
      border: 2px solid;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s, box-shadow 0.2s;
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .btn:active::after { opacity: 0.08; }

    .btn-no {
      background: var(--no-bg);
      color: var(--no-color);
      border-color: var(--no-border);
      box-shadow: 0 0 20px rgba(68, 204, 119, 0.15);
    }
    .btn-no:hover {
      transform: scale(1.05);
      box-shadow: 0 0 32px rgba(68, 204, 119, 0.3);
      filter: brightness(1.1);
    }

    #btn-yes {
      background: var(--yes-bg);
      color: var(--yes-color);
      border-color: var(--yes-border);
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.15);
    }
    #btn-yes:hover {
      box-shadow: 0 0 32px rgba(255, 68, 68, 0.3);
      filter: brightness(1.1);
    }

    #btn-yes.fleeing {
      position: fixed;
      transition: none;
      z-index: 100;
    }

    .result-text {
      display: none;
      font-family: 'Noto Serif Thai', serif;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: 800;
      color: var(--no-color);
      text-align: center;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sub {
      margin-top: 0.5rem;
      font-size: clamp(13px, 2.5vw, 16px);
      color: var(--muted);
      font-family: 'Sarabun', sans-serif;
      font-weight: 400;
    }

    .stage-label {
      position: absolute;
      bottom: 2rem;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="deco-circle c1"></div>
    <div class="deco-circle c2"></div>

    <h1 class="question">คุณคิดว่า<span>ซูโม่</span>เป็นบ้าไหม?</h1>

    <div class="choices" id="choices">
      <button class="btn btn-no" id="btn-no">ไม่</button>
      <button class="btn" id="btn-yes">ใช่</button>
    </div>

    <div class="result-text" id="result">
      ถูกต้อง! ซูโม่คือศิลปะอันทรงเกียรติ
      <div class="sub">ขอบคุณที่เข้าใจ</div>
    </div>

    <div class="stage-label" id="stage-label">เลือกคำตอบของคุณ</div>
  </div>

  <script>
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');
    const choices = document.getElementById('choices');
    const result = document.getElementById('result');
    const stageLabel = document.getElementById('stage-label');
    const scene = document.getElementById('scene');

    let stage = 0;
    let fleeing = false;
    let escapeInterval = null;
    let hasPointer = window.matchMedia('(pointer: fine)').matches;

    window.addEventListener('pointermove', () => { hasPointer = true; }, { once: true });

    function startFleeing() {
      fleeing = true;
      btnYes.classList.add('fleeing');

      // Place at current position first
      const r = btnYes.getBoundingClientRect();
      btnYes.style.left = r.left + 'px';
      btnYes.style.top = r.top + 'px';
      btnYes.style.width = r.width + 'px';
      btnYes.style.height = r.height + 'px';
      stageLabel.textContent = 'ลองกดถ้ากล้า...';

      if (!hasPointer) {
        moveRandom();
        escapeInterval = setInterval(moveRandom, 500);
      }
    }

    function moveRandom() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const bw = parseInt(btnYes.style.width) || 160;
      const bh = parseInt(btnYes.style.height) || 56;
      const margin = 16;
      const x = margin + Math.random() * (w - bw - margin * 2);
      const y = margin + Math.random() * (h - bh - margin * 2);
      btnYes.style.left = x + 'px';
      btnYes.style.top = y + 'px';
    }

    function fleeFromCursor(e) {
      if (!fleeing || !hasPointer) return;
      const r = btnYes.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const mx = e.clientX;
      const my = e.clientY;
      const dx = cx - mx;
      const dy = cy - my;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      // Only flee when close enough
      if (dist > 180) return;

      const flee = 160;
      const nx = cx + (dx / dist) * flee - r.width / 2;
      const ny = cy + (dy / dist) * flee - r.height / 2;

      const margin = 16;
      const maxX = window.innerWidth - r.width - margin;
      const maxY = window.innerHeight - r.height - margin;
      btnYes.style.left = Math.max(margin, Math.min(nx, maxX)) + 'px';
      btnYes.style.top = Math.max(margin, Math.min(ny, maxY)) + 'px';
    }

    document.addEventListener('mousemove', fleeFromCursor);

    btnYes.addEventListener('click', () => {
      if (stage === 0) {
        stage = 1;
        btnYes.textContent = 'แน่ใจนะ?';
        stageLabel.textContent = 'คิดดีดีก่อนนะ...';
      } else if (stage === 1) {
        stage = 2;
        btnYes.textContent = 'แน่ใจนะ?';
        startFleeing();
      }
    });

    btnNo.addEventListener('click', () => {
      if (escapeInterval) clearInterval(escapeInterval);
      choices.style.display = 'none';
      result.style.display = 'block';
      stageLabel.textContent = '';
    });
  </script>
</body>
</html>
